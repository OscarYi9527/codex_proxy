name: Release gate

on:
  push:
  pull_request:

jobs:
  release-check:
    # The release gate exercises the Windows PowerShell development lifecycle
    # scripts (including Get-NetTCPConnection and Win32_Process checks).
    # Running it on Ubuntu makes the required `powershell.exe` command fail
    # before those scripts can be validated.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run release gate
        shell: pwsh
        run: |
          npm run release:check 2>&1 | Tee-Object -FilePath release-check.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      - name: Publish release gate diagnostics
        if: failure()
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath release-check.log)) {
            exit 0
          }
          $tail = (Get-Content -LiteralPath release-check.log -Tail 60) -join "`n"
          Write-Host '::group::Release gate failure tail'
          Write-Host $tail
          Write-Host '::endgroup::'
          $annotation = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
          Write-Host "::error title=Release gate failure::$annotation"
