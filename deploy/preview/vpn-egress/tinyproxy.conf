# Docker drops every default capability. Keeping the proxy process under the
# container's capability-limited root identity avoids granting CHOWN solely
# to prepare a runtime PID directory.
User root
Group root
Port 7891
Listen 0.0.0.0
Timeout 600
MaxClients 100
StartServers 4
MinSpareServers 2
MaxSpareServers 8
PidFile "/run/tinyproxy/tinyproxy.pid"
LogFile "/dev/stderr"
LogLevel Info
DisableViaHeader Yes

# The published Docker port is bound to host loopback. Docker NAT reaches the
# container through its private bridge gateway, so allow only loopback and
# private bridge address ranges here as defense in depth.
Allow 127.0.0.1
Allow 172.16.0.0/12

ConnectPort 443
ConnectPort 80
