<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Codex Gateway · 管理控制台</title>
  <style>
    :root{
      --primary:#1769e0;--primary-soft:#eaf2ff;--green:#0f9f74;--amber:#d97706;--red:#dc3545;
      --bg:#f4f7fb;--surface:#fff;--surface-2:#f8fafc;--text:#172033;--muted:#697386;
      --faint:#98a2b3;--border:#e4e9f1;--shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.04);
      --sidebar:#111827;--sidebar-text:#cbd5e1;--sidebar-active:#fff;--radius:12px
    }
    html[data-theme=dark]{
      --primary:#4f92f5;--primary-soft:#172d4e;--bg:#0d131d;--surface:#151d29;--surface-2:#101722;
      --text:#edf2f7;--muted:#9aa7b8;--faint:#667085;--border:#273244;--shadow:0 8px 24px rgba(0,0,0,.16);
      --sidebar:#090e16;--sidebar-text:#9ba8ba
    }
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,"Segoe UI","Microsoft YaHei",system-ui,sans-serif;color:var(--text);background:var(--bg)}
    button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .shell{min-height:100vh;display:flex}.sidebar{position:fixed;inset:0 auto 0 0;width:248px;z-index:30;background:var(--sidebar);color:var(--sidebar-text);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06)}
    .brand{height:72px;padding:0 20px;display:flex;align-items:center;gap:11px}.brand-mark{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,#2878ef,#10a37f);color:white;font-weight:800;box-shadow:0 7px 18px rgba(23,105,224,.28)}
    .brand-copy{display:grid;line-height:1.2}.brand-copy strong{font-size:15px;color:white}.brand-copy span{font-size:11px;margin-top:4px;color:#718096}
    .nav-scroll{padding:8px 12px;overflow:auto}.nav-label{padding:17px 11px 7px;font-size:10px;font-weight:700;letter-spacing:.12em;color:#536176}
    .nav-btn{position:relative;width:100%;height:42px;border:0;border-radius:9px;padding:0 12px;display:flex;align-items:center;gap:11px;background:transparent;color:var(--sidebar-text);font-size:13px;text-align:left;margin:2px 0}
    .nav-btn svg{width:18px;height:18px;opacity:.82}.nav-btn:hover{background:rgba(255,255,255,.055);color:#fff}.nav-btn.active{background:linear-gradient(90deg,rgba(39,120,239,.24),rgba(39,120,239,.11));color:var(--sidebar-active);font-weight:650}.nav-btn.active:before{content:"";position:absolute;left:0;width:3px;height:20px;border-radius:0 4px 4px 0;background:#4c91f5}.nav-btn.active svg{color:#69a5ff;opacity:1}
    .sidebar-foot{margin-top:auto;padding:16px}.service-card{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);padding:12px;border-radius:10px}.service-line{display:flex;align-items:center;gap:8px;font-size:12px;color:#dbe4ef}.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(15,159,116,.13)}.service-card small{display:block;color:#68768a;margin:7px 0 0 16px}
    .main{margin-left:248px;width:calc(100% - 248px);min-height:100vh}.topbar{height:72px;position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--surface) 88%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;justify-content:space-between}
    .top-title strong{display:block;font-size:16px}.top-title span{display:block;font-size:11px;color:var(--muted);margin-top:4px}.top-actions{display:flex;align-items:center;gap:8px}.icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--muted);display:grid;place-items:center}.icon-btn:hover{color:var(--primary);border-color:var(--primary)}.icon-btn svg{width:17px}.mobile-menu{display:none}
    .content{padding:26px 28px 60px;max-width:1440px;margin:auto}.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:22px}.page-head h1{font-size:24px;margin:0 0 7px;letter-spacing:-.02em}.page-head p{margin:0;color:var(--muted);font-size:13px}
    .btn{height:36px;border:1px solid var(--border);border-radius:8px;padding:0 13px;background:var(--surface);color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:12px;font-weight:600;white-space:nowrap}.btn:hover{border-color:#aeb8c7;background:var(--surface-2)}.btn svg{width:15px;height:15px}.btn-primary{background:var(--primary);border-color:var(--primary);color:white}.btn-primary:hover{background:#0f5dc9;border-color:#0f5dc9}.btn-danger{color:var(--red)}.btn-danger:hover{border-color:var(--red);background:color-mix(in srgb,var(--red) 7%,var(--surface))}.btn-sm{height:30px;padding:0 9px}.btn-ghost{border-color:transparent;background:transparent}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.metric-top{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.metric-icon{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary)}.metric-icon svg{width:16px}.metric strong{display:block;font-size:27px;margin:8px 0 5px;letter-spacing:-.03em}.metric-foot{font-size:11px;color:var(--faint)}.metric-foot b{color:var(--green)}
    .grid{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(290px,.8fr);gap:16px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}.card-head{min-height:55px;padding:12px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}.card-title{display:flex;align-items:center;gap:9px}.card-title strong{font-size:14px}.card-title span{font-size:11px;color:var(--muted)}.card-body{padding:17px}.card-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
    .provider-row{display:grid;grid-template-columns:minmax(190px,1.2fr) minmax(120px,.7fr) minmax(130px,.8fr) auto;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}.provider-row:last-child{border-bottom:0}.provider-name{display:flex;align-items:center;gap:11px}.provider-logo{width:34px;height:34px;border-radius:10px;color:#fff;display:grid;place-items:center;font-weight:800;font-size:12px}.provider-logo.chatgpt{background:#10a37f}.provider-logo.openai{background:#334155}.provider-logo.deepseek{background:#4d6bfe}.provider-logo.relay{background:#ea8a26}.provider-name strong{display:block;font-size:13px}.provider-name small{display:block;color:var(--faint);margin-top:3px}.status{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--muted)}.status i{width:7px;height:7px;border-radius:50%;background:var(--green)}.status.warn i{background:var(--amber)}.status.off i{background:var(--faint)}
    .mini-bar{height:6px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:7px}.mini-bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),#65a6ff)}.activity{display:flex;gap:11px;padding:12px 0;border-bottom:1px solid var(--border)}.activity:last-child{border:0}.activity-icon{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);flex:none}.activity-icon svg{width:14px}.activity p{font-size:12px;margin:1px 0 5px}.activity small{color:var(--faint)}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:15px}.field{display:grid;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:600}.field .hint{font-size:10px;color:var(--faint);font-weight:400}.input-wrap{display:flex;gap:7px}.input,select,textarea{width:100%;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:8px;padding:0 11px;outline:0;font-size:12px}.input,select{height:38px}textarea{padding:10px;min-height:112px;resize:vertical;font-family:ui-monospace,monospace}.input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 12%,transparent)}.input[readonly]{opacity:.65}.form-footer{padding:14px 17px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
    .table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:12px}.table th{padding:11px 13px;text-align:left;color:var(--muted);font-weight:600;background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}.table td{padding:13px;border-bottom:1px solid var(--border);vertical-align:middle}.table tr:last-child td{border-bottom:0}.table tr:hover td{background:color-mix(in srgb,var(--primary) 2.5%,var(--surface))}.cell-main{font-weight:600}.cell-sub{color:var(--faint);font-size:10px;margin-top:4px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tags{display:flex;gap:5px;flex-wrap:wrap}.tag{padding:3px 7px;border-radius:6px;background:var(--surface-2);border:1px solid var(--border);font-size:10px;color:var(--muted)}.badge{display:inline-flex;padding:3px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:10px;font-weight:700}
    .empty{padding:52px 20px;text-align:center}.empty-icon{width:48px;height:48px;margin:0 auto 13px;border-radius:14px;display:grid;place-items:center;background:var(--surface-2);color:var(--faint)}.empty-icon svg{width:22px}.empty strong{display:block;font-size:13px}.empty p{color:var(--muted);font-size:11px;margin:7px 0 16px}
    .quick-import{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.quick-option{border:1px solid var(--border);border-radius:10px;background:var(--surface-2);padding:14px;text-align:left;color:var(--text);transition:.15s}.quick-option:hover,.quick-option.dragging{border-color:var(--primary);background:var(--primary-soft)}.quick-option svg{width:20px;color:var(--primary);margin-bottom:9px}.quick-option strong{display:block;font-size:12px}.quick-option small{display:block;color:var(--muted);margin-top:5px;line-height:1.5}.divider{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:10px;margin:4px 0 16px}.divider:before,.divider:after{content:"";height:1px;flex:1;background:var(--border)}
    .chart{height:220px;display:flex;align-items:flex-end;gap:14px;padding:12px 4px 2px}.chart-col{height:100%;flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:7px}.chart-bar{width:min(40px,65%);min-height:3px;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,#5599f5,var(--primary));position:relative}.chart-bar:hover:after{content:attr(data-value);position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:10px;padding:3px 6px;color:white;background:#111827;border-radius:5px}.chart-col label{font-size:9px;color:var(--faint);max-width:80px;overflow:hidden;text-overflow:ellipsis}
    .modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(8,15,28,.58);backdrop-filter:blur(3px);display:grid;place-items:center;padding:20px}.modal{width:min(580px,100%);max-height:90vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.25)}.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.modal-head strong{font-size:16px}.modal-body{padding:20px}.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
    .toast{position:fixed;right:24px;bottom:24px;z-index:200;display:flex;align-items:center;gap:9px;min-width:220px;padding:12px 15px;border-radius:10px;color:white;font-size:12px;box-shadow:0 12px 35px rgba(0,0,0,.2);animation:toast-in .2s}.toast.success{background:#07855f}.toast.error{background:#c93746}@keyframes toast-in{from{transform:translateY(10px);opacity:0}}
    .skeleton{height:14px;border-radius:6px;background:linear-gradient(90deg,var(--surface-2),var(--border),var(--surface-2));background-size:200%;animation:shine 1.3s infinite}@keyframes shine{to{background-position:-200%}}
    .help-banner{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:22px;margin-bottom:18px;border:1px solid color-mix(in srgb,var(--primary) 25%,var(--border));border-radius:var(--radius);background:linear-gradient(120deg,var(--primary-soft),var(--surface));box-shadow:var(--shadow)}.help-banner h2{font-size:19px;margin:9px 0 6px}.help-banner p{font-size:12px;color:var(--muted);margin:0}.help-intro p{font-size:12px;line-height:1.9;color:var(--muted);margin:0 0 8px}.help-intro p:last-child{margin:0}.help-intro b{color:var(--text)}.help-chooser{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:17px}.help-chooser>div{border:1px solid var(--border);border-radius:10px;padding:17px;background:var(--surface-2)}.help-chooser>div.recommended{border-color:color-mix(in srgb,var(--primary) 38%,var(--border));background:color-mix(in srgb,var(--primary) 5%,var(--surface))}.help-chooser h3{font-size:13px;margin:11px 0 7px}.help-chooser p{font-size:10px;line-height:1.7;color:var(--muted);min-height:52px;margin:0 0 13px}.help-steps{display:grid;gap:0}.help-step{display:grid;grid-template-columns:36px 1fr;gap:12px;padding:15px 0;border-bottom:1px solid var(--border)}.help-step:first-child{padding-top:2px}.help-step:last-child{border:0;padding-bottom:2px}.help-step strong{font-size:13px}.help-step p{font-size:11px;line-height:1.7;color:var(--muted);margin:5px 0 9px}.help-number{width:29px;height:29px;border-radius:50%;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700}.help-number.done{background:color-mix(in srgb,var(--green) 12%,var(--surface));border-color:color-mix(in srgb,var(--green) 35%,var(--border));color:var(--green)}.help-number svg{width:14px}.help-action{display:flex}.help-features{padding:7px}.help-feature{width:100%;border:0;border-bottom:1px solid var(--border);background:transparent;color:var(--text);display:grid;grid-template-columns:34px 1fr 16px;align-items:center;gap:10px;text-align:left;padding:11px;border-radius:8px}.help-feature:last-child{border-bottom:0}.help-feature:hover{background:var(--surface-2)}.help-feature>span{width:32px;height:32px;display:grid;place-items:center;border-radius:9px;background:var(--primary-soft);color:var(--primary)}.help-feature svg{width:15px}.help-feature>svg{color:var(--faint)}.help-feature strong,.help-feature small{display:block}.help-feature strong{font-size:12px}.help-feature small{font-size:10px;color:var(--muted);margin-top:3px}.help-concepts{padding:5px 17px}.help-concepts>div{padding:12px 0;border-bottom:1px solid var(--border)}.help-concepts>div:last-child{border:0}.help-concepts p{font-size:10px;line-height:1.65;color:var(--muted);margin:7px 0 0}.help-manual{padding:17px}.help-note{border-radius:9px;padding:13px;background:color-mix(in srgb,var(--primary) 7%,var(--surface-2));border:1px solid color-mix(in srgb,var(--primary) 18%,var(--border))}.help-note b{font-size:11px}.help-note p{font-size:10px;line-height:1.75;color:var(--muted);margin:5px 0 0}.help-manual ol{margin:17px 0 0;padding:0;list-style:none;counter-reset:guide}.help-manual li{position:relative;padding:0 0 17px 38px;counter-increment:guide}.help-manual li:before{content:counter(guide);position:absolute;left:0;top:0;width:25px;height:25px;border-radius:50%;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);font-size:10px;font-weight:800}.help-manual li:not(:last-child):after{content:"";position:absolute;left:12px;top:27px;bottom:2px;width:1px;background:var(--border)}.help-manual li b,.help-manual li span{display:block}.help-manual li b{font-size:12px}.help-manual li span{font-size:10px;line-height:1.75;color:var(--muted);margin-top:4px}.help-status{padding:5px 17px}.help-status>div{padding:11px 0;border-bottom:1px solid var(--border)}.help-status>div:last-child{border:0}.help-status p{font-size:10px;line-height:1.6;color:var(--muted);margin:6px 0 0}.help-faq{padding:4px 17px}.help-faq details{border-bottom:1px solid var(--border);padding:13px 0}.help-faq details:last-child{border:0}.help-faq summary{cursor:pointer;font-size:12px;font-weight:650}.help-faq p{font-size:11px;line-height:1.75;color:var(--muted);margin:9px 0 2px}
    @media(max-width:1050px){.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.provider-row{grid-template-columns:minmax(180px,1fr) 120px auto}.provider-row .usage-cell{display:none}.help-chooser{grid-template-columns:1fr}}
    @media(max-width:760px){.sidebar{transform:translateX(-100%);transition:.2s}.sidebar.open{transform:none;box-shadow:20px 0 50px rgba(0,0,0,.25)}.main{margin-left:0;width:100%}.mobile-menu{display:grid}.topbar{padding:0 15px}.content{padding:20px 14px 50px}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.page-head{align-items:flex-start;flex-direction:column}.provider-row{grid-template-columns:1fr auto}.provider-row .latency-cell{display:none}.help-banner{align-items:flex-start;flex-direction:column}}
    @media(max-width:480px){.metrics,.quick-import{grid-template-columns:1fr}.top-title span{display:none}.hide-mobile{display:none}}
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><div class="brand-mark">C</div><div class="brand-copy"><strong>Codex Gateway</strong><span>统一模型管理平台</span></div></div>
      <nav class="nav-scroll" id="nav"></nav>
      <div class="sidebar-foot"><div class="service-card"><div class="service-line"><i class="dot"></i><span id="side-status">网关服务运行中</span></div><small>Local · 127.0.0.1</small></div></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:11px"><button class="icon-btn mobile-menu" onclick="toggleSidebar()" aria-label="菜单" id="menuButton"></button><div class="top-title"><strong id="top-title">控制台概览</strong><span id="top-subtitle">查看网关运行状态与资源使用情况</span></div></div>
        <div class="top-actions"><button class="icon-btn" id="refreshButton" onclick="load(true)" title="刷新"></button><button class="icon-btn" id="themeButton" onclick="toggleTheme()" title="切换主题"></button><button class="btn hide-mobile" onclick="switchPage('settings')"><span class="status"><i></i></span>系统正常</button></div>
      </header>
      <div class="content" id="app"><div class="card"><div class="card-body"><div class="skeleton"></div></div></div></div>
    </main>
  </div>
  <script src="/admin/app.js"></script>
</body>
</html>
