name: Release gate

on:
  push:
  pull_request:

jobs:
  release-check:
    # The release gate exercises the Windows PowerShell development lifecycle
    # scripts (including Get-NetTCPConnection and Win32_Process checks).
    # Running it on Ubuntu makes the required `powershell.exe` command fail
    # before those scripts can be validated.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:check
