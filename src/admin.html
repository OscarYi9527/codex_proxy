<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex 代理 · 管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg-elev:#161b22;--bg-elev-2:#1c2128;--border:#30363d;
  --text:#c9d1d9;--text-dim:#8b949e;--text-faint:#484f58;
  --accent:#58a6ff;--accent-dim:#1f6feb;
  --ok:#3fb950;--err:#f85149;--warn:#d29922;
}
body{font:14px/1.55 -apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}

.shell{display:flex;min-height:100vh}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{width:212px;flex-shrink:0;background:linear-gradient(180deg,var(--bg-elev),var(--bg));border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px}
.brand .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.brand .name{font-size:14px;font-weight:700;color:var(--text)}
.brand .sub{font-size:10px;color:var(--text-faint)}
.nav{padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:13px;color:var(--text-dim);cursor:pointer;border-radius:8px;border:none;background:none;text-align:left;transition:all .15s;width:100%}
.nav-btn:hover{background:var(--bg-elev-2);color:var(--text)}
.nav-btn.active{background:linear-gradient(90deg,#1f6feb26,transparent);color:var(--accent);font-weight:600}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px 20px;font-size:10px;color:var(--text-faint);border-top:1px solid var(--border)}

/* ── Main ────────────────────────────────────────────── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:rgba(22,27,34,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar .title{font-size:15px;font-weight:700}
.topbar .meta{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:16px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;box-shadow:0 0 0 3px currentColor22}
.status-dot.ok{background:var(--ok);color:var(--ok)}.status-dot.err{background:var(--err);color:var(--err)}
.content{padding:24px 28px 60px;max-width:1080px;width:100%;margin:0 auto}

/* ── Sections / Cards ────────────────────────────────── */
.section{background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.section-header{background:var(--bg-elev-2);padding:13px 18px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;align-items:center;gap:10px}
.section-body{padding:18px}
.form-row{display:flex;align-items:center;margin-bottom:12px;gap:12px}
.form-row:last-child{margin-bottom:0}
.form-row label{width:150px;flex-shrink:0;font-size:12px;color:var(--text-dim);text-align:right}
.form-row input,.form-row select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.form-row select{font-family:inherit;cursor:pointer}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--accent)}
.upstream-badge{font-size:11px;color:var(--text-dim);white-space:nowrap}
.upstream-badge b{color:var(--accent)}

.btn{font-size:12px;padding:7px 14px;border-radius:7px;border:1px solid var(--border);cursor:pointer;background:var(--bg-elev-2);color:var(--text);transition:all .15s}
.btn:hover{background:#262c36;border-color:#484f58}
.btn-primary{background:linear-gradient(180deg,#2ea043,#238636);border-color:#238636;color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-danger{background:#da3633;border-color:#da3633;color:#fff}
.btn-danger:hover{background:#f85149}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.actions{padding:16px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border)}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;z-index:999;animation:fadeIn .2s;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.toast.success{background:#238636;color:#fff}
.toast.error{background:#da3633;color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.badge{font-size:10px;padding:2px 9px;border-radius:10px;background:#1f6feb26;color:var(--accent);border:1px solid #1f6feb44;margin-left:8px}
.provider-icon{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.provider-icon.chatgpt-sub{background:#10a37f;color:#fff}
.provider-icon.deepseek{background:#4d6bfe;color:#fff}
.provider-icon.openai-api{background:#74aa9c;color:#fff}
.provider-icon.relay{background:#d29922;color:#fff}

.relay-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.relay-card:hover{border-color:#484f58}
.relay-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.relay-card-header .name{font-weight:600;color:var(--text)}
.relay-card-header .url{font-size:11px;color:var(--text-dim);font-family:ui-monospace,monospace;flex:1;min-width:120px}
.relay-card-models{display:flex;flex-wrap:wrap;gap:5px}
.model-tag{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--bg-elev-2);color:var(--text-dim);font-family:ui-monospace,monospace;border:1px solid var(--border)}
.empty-state{text-align:center;padding:48px 16px;color:var(--text-faint)}
.empty-state .icon{font-size:44px;margin-bottom:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(1,4,9,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:480px;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h3{font-size:16px;margin-bottom:16px;color:var(--accent)}
.modal .form-row label{width:100px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.ping-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text-dim);transition:all .15s;margin-left:8px}
.ping-btn:hover{background:var(--bg-elev-2);color:var(--text)}
.ping-btn.testing{animation:pulse 1s infinite;color:var(--warn)}
.ping-btn.ok{color:var(--ok);border-color:#3fb95044}
.ping-btn.fail{color:var(--err);border-color:#f8514944}
.ping-result{font-size:11px;margin-left:8px;white-space:nowrap}
.ping-result.ok{color:var(--ok)}.ping-result.fail{color:var(--err)}
.ping-btn-all{padding:7px 16px;font-size:12px;margin-left:auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Stats ───────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.kpi-card .label{font-size:11px;color:var(--text-dim);margin-bottom:6px}
.kpi-card .value{font-size:22px;font-weight:700;color:var(--text)}
.stat-bar-track{height:6px;border-radius:3px;background:var(--bg-elev-2);overflow:hidden;margin:8px 0 4px}
.stat-bar-fill{height:100%;border-radius:3px}
.chart-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:8px}
.chart-col{flex:1 1 300px;min-width:260px}
.chart-title{font-size:12px;color:var(--text-dim);margin-bottom:10px;font-weight:600}
.chart-col svg{display:block;overflow:visible}
.chart-legend{display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text-dim);flex-wrap:wrap}
.chart-legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar">
    <div class="brand"><span class="logo">C</span><div><div class="name">Codex 代理</div><div class="sub">管理后台</div></div></div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-footer">本地多上游代理控制台</div>
  </div>
  <div class="main">
    <div class="topbar">
      <span class="title" id="topbar-title">配置</span>
      <span class="meta">
        <button id="ping_all" class="btn ping-btn-all" onclick="pingAll()">🔍 全通道测试</button>
        <span id="status"><span class="status-dot ok"></span>运行中</span>
      </span>
    </div>
    <div class="content" id="app"></div>
  </div>
</div>
<script src="/admin/app.js"></script>
</body>
</html>
