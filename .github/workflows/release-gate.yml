name: Release gate

on:
  push:
  pull_request:

jobs:
  release-check:
    # The release gate executes Windows-only lifecycle contracts
    # (powershell.exe, Get-NetTCPConnection, and Win32_Process checks).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Secret Scan falls back to the HEAD diff on a clean CI checkout.
          # Keep the parent commit so HEAD is not interpreted as a root commit.
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - name: Run release gate
        shell: pwsh
        run: |
          npm run release:check 2>&1 | Tee-Object -FilePath release-check.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      - name: Publish release gate diagnostics
        if: failure()
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath release-check.log)) {
            exit 0
          }
          $tail = (Get-Content -LiteralPath release-check.log -Tail 80) -join "`n"
          Write-Host '::group::Release gate failure tail'
          Write-Host $tail
          Write-Host '::endgroup::'
          $annotation = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
          Write-Host "::error title=Release gate failure::$annotation"

  rk3588-arm64-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/rk3588/Dockerfile
          platforms: linux/arm64
          push: false
          tags: codex-proxy-rk3588:ci
